# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
- name: spot
  instanceTypes: [,"t3.medium","t3.large","t2.xlarge","t2.2xlarge"]
  # AWS Free tier
  #instanceTypes: ["m7i-flex.large","c7i-flex.large","t3.small"]
  spot: true
  desiredCapacity: 2